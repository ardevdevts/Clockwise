name: Flutter CI (Windows + Android)

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'   # 🔥 Triggers when a version tag like v1.0.0 or v2.0 is pushed
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build Flutter (Windows + Android)
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # Adjust to your Flutter version
          channel: 'stable'

      # 3️⃣ Enable desktop support
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5️⃣ Analyze Dart code
      - name: Analyze code
        run: flutter analyze

      # 6️⃣ Run tests
      - name: Run tests
        run: flutter test

      # 7️⃣ Build Android APK
      - name: Build Android APK
        run: flutter build apk --release

      # 8️⃣ Build Windows App
      - name: Build Windows App
        run: flutter build windows --release

      # 9️⃣ Upload build artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/windows/runner/Release/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # ✅ Only run for version tags

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Download artifacts from build job
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: release/

      # 3️⃣ Create GitHub release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/app-release.apk
            release/Release/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
